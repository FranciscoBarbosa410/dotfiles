# --- Configurações de Janela e Opacidade ---
remember_window_size  no
initial_window_width  105c
initial_window_height 30c
hide_window_decorations no
background_opacity    0.75
window_padding_width  10

# --- Fontes ---
font_family      JetBrains Mono Nerd Font Regular
bold_font        JetBrains Mono Nerd Font Bold
italic_font      JetBrains Mono Nerd Font Italic
bold_italic_font JetBrains Mono Nerd Font Bold Italic
font_size        12.0

# --- Histórico e Mouse ---
scrollback_lines 10000
copy_on_select    yes
cursor_shape      underline

# --- Cores (Tema Nord) ---
background #2e3440
foreground #d8dee9

# Cores Normais
color0 #3b4252
color1 #bf616a
color2 #a3be8c
color3 #ebcb8b
color4 #81a1c1
color5 #b48ead
color6 #88c0d0
color7 #e5e9f0

# Cores Brilhantes
color8  #4c566a
color9  #bf616a
color10 #a3be8c
color11 #ebcb8b
color12 #81a1c1
color13 #b48ead
color14 #8fbcbb
color15 #eceff4

# --- Atalhos (Keybindings) ---
map ctrl+shift+c copy_to_clipboard
map ctrl+shift+v paste_from_clipboard
map ctrl+0 change_font_size all 0

map shift+page_up scroll_page_up
map shift+page_down scroll_page_down
map shift+home scroll_home
map shift+end scroll_end